name: Build Linux ARM64

on:
  workflow_call:

jobs:
  build:
    name: Linux ARM64
    runs-on: ubuntu-22.04-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxext-dev \
            libxrender-dev \
            libxdamage-dev \
            libxfixes-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64

      - name: Build
        run: cmake --build build --config Release --parallel $(nproc)
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SimpleVAvatar-linux-arm64
          path: build/SimpleVirtualAvatar
          if-no-files-found: warn